services:
  neo4j:
    image: neo4j:5.26
    container_name: agent-memory-neo4j-dev
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/devpassword
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j-dev-data:/data
      - neo4j-dev-logs:/logs

volumes:
  neo4j-dev-data:
  neo4j-dev-logs:
